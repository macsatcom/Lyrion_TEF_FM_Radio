# tef → mp3 : run tef-stream.pl, which tunes the TEF chip and exec()s ffmpeg.
# TSCRIPT / SERL / DEVI / BITR are placeholders replaced by Plugin.pm at startup.
#
# Capability 'R' (remote URL): LMS runs the command directly as a pipe and
# passes $URL$ (the tefradio:// URL) as an argument. new() is NOT called.

tef mp3 * *
	# R
	TSCRIPT $URL$ SERL DEVI BITR
